baseURL = "https://ogregoire.be/tools/"
languageCode = "en-us"
title = "Tools"
enableRobotsTXT = true

# Only `tags` — overriding the defaults drops the `categories` taxonomy.
[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

# Default component mounts, declared explicitly because adding any module
# mount disables Hugo's implicit defaults. Plus a narrowed content→assets
# mount exposing ONLY tool JS so js.Build can resolve a page bundle's
# sibling imports (./units.js, ./convert.js) alongside assets-root imports
# (js/lib/*). The narrowing keeps content .md files out of the assets vfs.
[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "content"
  target = "assets"
  includeFiles = "**/*.js"

[[module.mounts]]
  source = "assets"
  target = "assets"

[[module.mounts]]
  source = "layouts"
  target = "layouts"

[[module.mounts]]
  source = "static"
  target = "static"

[[module.mounts]]
  source = "data"
  target = "data"

[[module.mounts]]
  source = "i18n"
  target = "i18n"

[[module.mounts]]
  source = "archetypes"
  target = "archetypes"
