{{ define "main" }}
<section class="listing">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}
  <ul class="tag-list">
    {{ range .Pages.ByTitle }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> <span class="tag-count">{{ len .Pages }}</span></li>
    {{ end }}
  </ul>
</section>
{{ end }}
